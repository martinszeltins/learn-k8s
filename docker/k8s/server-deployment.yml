apiVersion: apps/v1
kind: Deployment
metadata:
  name: learn-k8s-server
  labels:
    app: learn-k8s-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: learn-k8s-server
  template:
    metadata:
      labels:
        app: learn-k8s-server
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: server
          image: learn-k8s-server:latest
          ports:
            - containerPort: 80
          env:
            - name: APP_ENV
              value: "production"
            - name: APP_DEBUG
              value: "false"
            - name: APP_KEY
              value: "base64:CHANGE_ME_GENERATE_WITH_PHP_ARTISAN_KEY_GENERATE"
